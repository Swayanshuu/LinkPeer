<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="igit_connects">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>igit_connects</title>
  <link rel="manifest" href="manifest.json">

  <!-- Auto-redirect mobile browsers to the native app -->
  <script>
    var isAndroid = /android/i.test(navigator.userAgent || navigator.vendor || window.opera);
    var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

    if (isAndroid) {
      // Force Android Chrome/Browser to launch the app via intent
      var intentUrl = "intent://linkpeer.swynx.dev" + window.location.pathname + window.location.search + window.location.hash + "#Intent;scheme=https;package=com.igitconnect.igit_connects;end;";
      window.location.replace(intentUrl);
    } else if (isIOS) {
      // Force iOS Safari to launch the app via custom scheme
      var iosUrl = "linkpeer://post" + window.location.pathname.replace('/post', '') + window.location.search + window.location.hash;
      window.location.replace(iosUrl);
    }
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
